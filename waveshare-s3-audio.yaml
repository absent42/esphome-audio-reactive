esphome:
  name: audio-reactive-waveshare
  friendly_name: Audio Reactive Sensor (Waveshare)

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

wifi:
  power_save_mode: none  # Disabled for real-time audio streaming; enable for battery use

improv_serial:

api:

logger:
  level: INFO

external_components:
  - source: components
    components: [audio_reactive]

i2c:
  sda: GPIO11
  scl: GPIO10

# TCA9555 I2C GPIO expander (buttons K1-K3, speaker amp enable)
tca9555:
  id: ioexp
  address: 0x20

audio_adc:
  - platform: es7210
    address: 0x40
    id: es7210_adc
    sample_rate: 44100
    bits_per_sample: 16bit

audio_dac:
  - platform: es8311
    address: 0x18
    id: es8311_dac
    sample_rate: 44100
    bits_per_sample: 16bit

# Separate I2S buses for mic input and speaker output (shared clock pins)
i2s_audio:
  - id: i2s_input
    i2s_lrclk_pin:
      number: GPIO14
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO13
      allow_other_uses: true

  - id: i2s_output
    i2s_lrclk_pin:
      number: GPIO14
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO13
      allow_other_uses: true
    i2s_mclk_pin: GPIO12

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_input
    adc_type: external
    i2s_din_pin: GPIO15
    pdm: false
    sample_rate: 44100
    bits_per_sample: 16bit
    channel: left

audio_reactive:
  id: audio_analysis
  microphone: mic
  update_interval: 50ms
  beat_sensitivity: 50
  squelch: 10
  sample_rate: 44100
  fft_size: 512
  debug_logging: true
  on_mute_changed:
    - if:
        condition:
          switch.is_on: mic_mute
        then:
          - light.turn_on:
              id: status_leds
              red: 1
              green: 0
              blue: 0
              brightness: 100%
        else:
          - light.turn_off: status_leds
  on_quiet_calibration_started:
    - light.turn_on:
        id: status_leds
        red: 0
        green: 1
        blue: 0
        brightness: 50%
        effect: pulse
  on_quiet_calibration_complete:
    - light.turn_on:
        id: status_leds
        red: 0
        green: 1
        blue: 0
        brightness: 100%
        effect: none
    - delay: 1s
    - light.turn_off: status_leds
  on_music_calibration_started:
    - light.turn_on:
        id: status_leds
        red: 0
        green: 0
        blue: 1
        brightness: 50%
        effect: pulse
  on_music_calibration_complete:
    - light.turn_on:
        id: status_leds
        red: 0
        green: 0
        blue: 1
        brightness: 100%
        effect: none
    - delay: 1s
    - light.turn_off: status_leds

sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    bass_energy:
      name: "Bass Energy"
    mid_energy:
      name: "Mid Energy"
    high_energy:
      name: "High Energy"
    amplitude:
      name: "Amplitude"
    bpm:
      name: "BPM"

binary_sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    onset_detected:
      name: "Audio Sensor"
    silence:
      name: "Silence"
  # K1: Calibrate quiet room
  - platform: gpio
    pin:
      tca9555: ioexp
      number: 9
      inverted: true
    name: "Calibrate Quiet (K1)"
    on_press:
      - button.press: calibrate_quiet_btn
  # K2: Calibrate music level
  - platform: gpio
    pin:
      tca9555: ioexp
      number: 10
      inverted: true
    name: "Calibrate Music (K2)"
    on_press:
      - button.press: calibrate_music_btn
  # K3: Toggle mute
  - platform: gpio
    pin:
      tca9555: ioexp
      number: 11
      inverted: true
    name: "Toggle Mute (K3)"
    on_press:
      - switch.toggle: mic_mute

number:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    beat_sensitivity:
      name: "Beat Sensitivity"
    squelch:
      name: "Squelch"

select:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    detection_mode:
      name: "Detection Mode"

switch:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    microphone_mute:
      name: "Microphone Mute"
      id: mic_mute
  # Speaker amplifier enable via TCA9555 expander (EXIO8)
  - platform: gpio
    id: speaker_amp
    name: "Speaker Amplifier"
    pin:
      tca9555: ioexp
      number: 8
      inverted: false
    restore_mode: RESTORE_DEFAULT_OFF

button:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    reset_agc:
      name: "Reset AGC"
      id: reset_agc_btn
    calibrate_quiet:
      name: "Calibrate Quiet Room"
      id: calibrate_quiet_btn
    calibrate_music:
      name: "Calibrate Music Level"
      id: calibrate_music_btn

light:
  - platform: esp32_rmt_led_strip
    id: status_leds
    rgb_order: RGB
    chipset: WS2812
    pin: GPIO38
    num_leds: 7
    name: "Status LEDs"
    effects:
      - pulse:
          name: pulse
          transition_length: 500ms
          update_interval: 500ms
