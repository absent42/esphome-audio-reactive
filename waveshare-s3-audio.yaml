esphome:
  name: audio-reactive-waveshare
  friendly_name: Audio Reactive Sensor (Waveshare)

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

wifi:

improv_serial:

api:

logger:
  level: INFO

external_components:
  - source: components
    components: [audio_reactive]

i2c:
  sda: GPIO11
  scl: GPIO10

audio_adc:
  - platform: es7210
    address: 0x40
    id: es7210_adc

audio_dac:
  - platform: es8311
    address: 0x18
    id: es8311_dac

i2s_audio:
  i2s_lrclk_pin: GPIO14
  i2s_bclk_pin: GPIO13
  i2s_mclk_pin: GPIO12

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_din_pin: GPIO15
    pdm: false
    sample_rate: 44100
    bits_per_sample: 16bit

audio_reactive:
  id: audio_analysis
  microphone: mic
  update_interval: 50ms
  beat_sensitivity: 50
  squelch: 10
  sample_rate: 44100
  fft_size: 1024
  on_mute_changed:
    - if:
        condition:
          switch.is_on: mic_mute
        then:
          - light.turn_on:
              id: status_led
              red: 1
              green: 0
              blue: 0
              brightness: 100%
        else:
          - light.turn_off: status_led
  on_calibration_started:
    - light.turn_on:
        id: status_led
        red: 0
        green: 1
        blue: 0
        brightness: 50%
        effect: pulse
  on_calibration_complete:
    - light.turn_on:
        id: status_led
        red: 0
        green: 1
        blue: 0
        brightness: 100%
        effect: none
    - delay: 1s
    - light.turn_off: status_led

sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    bass_energy:
      name: "Bass Energy"
    mid_energy:
      name: "Mid Energy"
    high_energy:
      name: "High Energy"
    amplitude:
      name: "Amplitude"
    bpm:
      name: "BPM"

binary_sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    onset_detected:
      name: "Audio Sensor"
    silence:
      name: "Silence"
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    name: "Device Button"
    id: device_button
    on_multi_click:
      # Double click: calibrate quiet room
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - button.press: calibrate_quiet_btn
      # Triple click: calibrate music level
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - button.press: calibrate_music_btn
      # Long press (>= 1s): toggle mute
      - timing:
          - ON for at least 1s
        then:
          - switch.toggle: mic_mute

number:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    beat_sensitivity:
      name: "Beat Sensitivity"
    squelch:
      name: "Squelch"

select:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    detection_mode:
      name: "Detection Mode"

switch:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    microphone_mute:
      name: "Microphone Mute"
      id: mic_mute

button:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    reset_agc:
      name: "Reset AGC"
      id: reset_agc_btn
    calibrate_quiet:
      name: "Calibrate Quiet Room"
      id: calibrate_quiet_btn
    calibrate_music:
      name: "Calibrate Music Level"
      id: calibrate_music_btn

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO38
    num_leds: 7
    name: "Status LED"
    effects:
      - pulse:
          name: pulse
          transition_length: 500ms
          update_interval: 500ms
