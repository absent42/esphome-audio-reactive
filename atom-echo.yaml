esphome:
  name: audio-reactive
  friendly_name: Audio Reactive Sensor

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

wifi:

improv_serial:

api:

logger:
  level: INFO

external_components:
  - source: github://absent42/esphome-audio-reactive
    components: [audio_reactive]

i2s_audio:
  i2s_lrclk_pin: GPIO33
  i2s_bclk_pin: GPIO19

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_din_pin: GPIO23
    pdm: true
    sample_rate: 22050
    bits_per_sample: 16bit
    channel: right

audio_reactive:
  id: audio_analysis
  microphone: mic
  update_interval: 50ms
  beat_sensitivity: 50
  squelch: 10

sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    bass_energy:
      name: "Bass Energy"
    mid_energy:
      name: "Mid Energy"
    high_energy:
      name: "High Energy"
    amplitude:
      name: "Amplitude"
    bpm:
      name: "BPM"

binary_sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    onset_detected:
      name: "Audio Sensor"
    silence:
      name: "Silence"
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
    name: "Device Button"
    id: device_button
    on_multi_click:
      # Short press (< 1s): AGC reset with green flash
      - timing:
          - ON for at most 1s
          - OFF for at least 0.3s
        then:
          - button.press: reset_agc_btn
          - light.turn_on:
              id: status_led
              effect: none
              red: 0
              green: 1
              blue: 0
              brightness: 100%
          - delay: 800ms
          - light.turn_off: status_led
      # Long press (>= 1s): toggle mute
      - timing:
          - ON for at least 1s
        then:
          - switch.toggle: mic_mute

number:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    beat_sensitivity:
      name: "Beat Sensitivity"
    squelch:
      name: "Squelch"

select:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    detection_mode:
      name: "Detection Mode"

switch:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    microphone_mute:
      name: "Microphone Mute"
      id: mic_mute
      on_turn_on:
        - light.turn_on:
            id: status_led
            red: 1
            green: 0
            blue: 0
            brightness: 100%
      on_turn_off:
        - light.turn_off: status_led

button:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    reset_agc:
      name: "Reset AGC"
      id: reset_agc_btn

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    rgb_order: GRB
    chipset: SK6812
    pin: GPIO27
    num_leds: 1
    name: "Status LED"
