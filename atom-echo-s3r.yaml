esphome:
  name: audio-reactive-s3r
  friendly_name: Audio Reactive Sensor (S3R)

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  power_save_mode: none

improv_serial:

api:

logger:
  level: INFO

external_components:
  - source: components
    components: [audio_reactive]

i2c:
  sda: GPIO45
  scl: GPIO0

audio_dac:
  - platform: es8311
    address: 0x18
    id: es8311_dac

i2s_audio:
  - id: i2s_input
    i2s_lrclk_pin:
      number: GPIO3
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO17
      allow_other_uses: true
    i2s_mclk_pin:
      number: GPIO11
      allow_other_uses: true
  - id: i2s_output
    i2s_lrclk_pin:
      number: GPIO3
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO17
      allow_other_uses: true
    i2s_mclk_pin:
      number: GPIO11
      allow_other_uses: true

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_input
    adc_type: external
    i2s_din_pin: GPIO4
    pdm: false
    sample_rate: 44100
    bits_per_sample: 16bit
    channel: left

audio_reactive:
  id: audio_analysis
  microphone: mic
  dsp_tier: pro                 # ESP32-S3 + PSRAM: 2048-FFT / 44.1kHz pro pipeline
  update_interval: 50ms
  beat_sensitivity: 50
  squelch: 10
  fft_size: 512
  debug_logging: false
  on_mute_changed:
    - if:
        condition:
          switch.is_on: mic_mute
        then:
          - script.execute: play_mute_tone
        else:
          - script.execute: play_unmute_tone
  on_quiet_calibration_started: []
  on_quiet_calibration_complete:
    - script.execute: play_done_and_restart_mic
  on_music_calibration_started: []
  on_music_calibration_complete:
    - script.execute: play_done_and_restart_mic

script:
  - id: play_done_and_restart_mic
    then:
      - lambda: ESP_LOGI("s3r", "Stopping mic for speaker tone...");
      - lambda: id(mic).stop();
      - delay: 200ms
      - lambda: ESP_LOGI("s3r", "Playing done tone...");
      - output.turn_on: speaker_amp_enable
      - rtttl.play: "done:d=8,o=5,b=200:e5,g5"
      - delay: 1500ms
      - output.turn_off: speaker_amp_enable
      - lambda: ESP_LOGI("s3r", "Restarting mic...");
      - delay: 200ms
      - lambda: id(mic).start();
      - lambda: ESP_LOGI("s3r", "Mic restarted");
  - id: play_mute_tone
    then:
      - lambda: id(mic).stop();
      - delay: 100ms
      - output.turn_on: speaker_amp_enable
      - rtttl.play: "muted:d=16,o=5,b=200:c5,p,c4"
      - delay: 800ms
      - output.turn_off: speaker_amp_enable
  - id: play_unmute_tone
    then:
      - output.turn_on: speaker_amp_enable
      - rtttl.play: "unmuted:d=16,o=5,b=200:c4,p,c5"
      - delay: 800ms
      - output.turn_off: speaker_amp_enable
      - delay: 200ms
      - lambda: id(mic).stop();
      - delay: 100ms
      - lambda: id(mic).start();

sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    bass_energy:
      name: "Bass Energy"
    mid_energy:
      name: "Mid Energy"
    high_energy:
      name: "High Energy"
    amplitude:
      name: "Amplitude"
    bpm:
      name: "BPM"
    centroid:
      name: "Spectral Centroid"
    rolloff:
      name: "Spectral Rolloff"
    beat_confidence:
      name: "Beat Confidence"
    beat_phase:
      name: "Beat Phase"
    onset_strength:
      name: "Onset Strength"
    sub_bass_energy:
      name: "Audio Sub Bass"
    low_mid_energy:
      name: "Audio Low Mid"
    upper_mid_energy:
      name: "Audio Upper Mid"
    air_energy:
      name: "Audio Air"

binary_sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    onset_detected:
      name: "Audio Sensor"
    silence:
      name: "Silence"
    calibration_stale:
      name: "Audio Calibration Stale"
      entity_category: diagnostic
    beat_event:
      name: "Audio Beat"
  - platform: gpio
    pin:
      number: GPIO41
      inverted: true
    name: "Device Button"
    id: device_button
    on_multi_click:
      # Double click: calibrate quiet room
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - button.press: calibrate_quiet_btn
      # Triple click: calibrate music level
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - button.press: calibrate_music_btn
      # Long press (>= 1s): toggle mute
      - timing:
          - ON for at least 1s
        then:
          - switch.toggle: mic_mute

number:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    beat_sensitivity:
      name: "Beat Sensitivity"
    squelch:
      name: "Squelch"

select:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    detection_mode:
      name: "Detection Mode"

switch:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    microphone_mute:
      name: "Microphone Mute"
      id: mic_mute

button:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    reset_agc:
      name: "Reset AGC"
      id: reset_agc_btn
    calibrate_quiet:
      name: "Calibrate Quiet Room"
      id: calibrate_quiet_btn
    calibrate_music:
      name: "Calibrate Music Level"
      id: calibrate_music_btn

output:
  - platform: gpio
    pin: GPIO18
    id: speaker_amp_enable

speaker:
  - platform: i2s_audio
    id: speaker_out
    i2s_audio_id: i2s_output
    dac_type: external
    i2s_dout_pin: GPIO48
    sample_rate: 44100

rtttl:
  id: buzzer
  speaker: speaker_out
