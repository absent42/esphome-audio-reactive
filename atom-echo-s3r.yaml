esphome:
  name: audio-reactive-s3r
  friendly_name: Audio Reactive Sensor (S3R)

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:

improv_serial:

api:

logger:
  level: INFO

external_components:
  - source: components
    components: [audio_reactive]

i2c:
  sda: GPIO0
  scl: GPIO45

audio_dac:
  - platform: es8311
    address: 0x18
    id: es8311_dac

i2s_audio:
  i2s_lrclk_pin: GPIO3
  i2s_bclk_pin: GPIO17
  i2s_mclk_pin: GPIO11

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_din_pin: GPIO4
    pdm: false
    sample_rate: 44100
    bits_per_sample: 16bit

audio_reactive:
  id: audio_analysis
  microphone: mic
  update_interval: 50ms
  beat_sensitivity: 50
  squelch: 10
  sample_rate: 44100
  fft_size: 1024
  on_mute_changed:
    - if:
        condition:
          switch.is_on: mic_mute
        then:
          - output.turn_on: speaker_amp_enable
          - rtttl.play: "muted:d=16,o=5,b=200:c5,p,c4"
          - delay: 500ms
          - output.turn_off: speaker_amp_enable
        else:
          - output.turn_on: speaker_amp_enable
          - rtttl.play: "unmuted:d=16,o=5,b=200:c4,p,c5"
          - delay: 500ms
          - output.turn_off: speaker_amp_enable
  on_calibration_started:
    - output.turn_on: speaker_amp_enable
    - rtttl.play: "cal_start:d=16,o=5,b=200:c5,e5,g5"
    - delay: 500ms
    - output.turn_off: speaker_amp_enable
  on_calibration_complete:
    - output.turn_on: speaker_amp_enable
    - rtttl.play: "cal_done:d=8,o=5,b=200:g5,c6"
    - delay: 500ms
    - output.turn_off: speaker_amp_enable

sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    bass_energy:
      name: "Bass Energy"
    mid_energy:
      name: "Mid Energy"
    high_energy:
      name: "High Energy"
    amplitude:
      name: "Amplitude"
    bpm:
      name: "BPM"

binary_sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    onset_detected:
      name: "Audio Sensor"
    silence:
      name: "Silence"
  - platform: gpio
    pin:
      number: GPIO41
      inverted: true
    name: "Device Button"
    id: device_button
    on_multi_click:
      # Double click: calibrate quiet room
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - button.press: calibrate_quiet_btn
      # Triple click: calibrate music level
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - button.press: calibrate_music_btn
      # Long press (>= 1s): toggle mute
      - timing:
          - ON for at least 1s
        then:
          - switch.toggle: mic_mute

number:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    beat_sensitivity:
      name: "Beat Sensitivity"
    squelch:
      name: "Squelch"

select:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    detection_mode:
      name: "Detection Mode"

switch:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    microphone_mute:
      name: "Microphone Mute"
      id: mic_mute

button:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    reset_agc:
      name: "Reset AGC"
      id: reset_agc_btn
    calibrate_quiet:
      name: "Calibrate Quiet Room"
      id: calibrate_quiet_btn
    calibrate_music:
      name: "Calibrate Music Level"
      id: calibrate_music_btn

output:
  - platform: gpio
    pin: GPIO18
    id: speaker_amp_enable

speaker:
  - platform: i2s_audio
    id: speaker_out
    dac_type: external
    i2s_dout_pin: GPIO48
    sample_rate: 44100

rtttl:
  id: buzzer
  speaker: speaker_out
