name: Build Firmware

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device:
          - name: atom-echo
            yaml: example-atom-echo.yaml
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        uses: esphome/build-action@v6
        id: build
        with:
          yaml-file: ${{ matrix.device.yaml }}

      - name: Copy firmware to static/
        run: |
          mkdir -p static/firmware
          cp ${{ steps.build.outputs.name }}/*.factory.bin static/firmware/${{ matrix.device.name }}.factory.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.device.name }}
          path: static/firmware/${{ matrix.device.name }}.factory.bin

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - name: Download all firmware
        uses: actions/download-artifact@v4
        with:
          path: static/firmware
          merge-multiple: true

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

      - name: Publish
        uses: actions/deploy-pages@v4
