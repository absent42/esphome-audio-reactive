esphome:
  name: audio-reactive-stickc
  friendly_name: Audio Reactive Sensor (StickC Plus2)
  on_boot:
    priority: 900
    then:
      - output.turn_on: power_hold

esp32:
  board: m5stick-c
  framework:
    type: esp-idf

wifi:

improv_serial:

api:

logger:
  level: INFO

external_components:
  - source: components
    components: [audio_reactive]

i2s_audio:
  i2s_lrclk_pin: GPIO0
  i2s_bclk_pin: GPIO26

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_din_pin: GPIO34
    pdm: true
    sample_rate: 22050
    bits_per_sample: 16bit
    channel: left

audio_reactive:
  id: audio_analysis
  microphone: mic
  update_interval: 50ms
  beat_sensitivity: 50
  squelch: 10
  sample_rate: 22050
  debug_logging: true
  on_mute_changed:
    - if:
        condition:
          switch.is_on: mic_mute
        then:
          - output.turn_on: led_red
          - script.execute:
              id: show_status
              state: 1
        else:
          - output.turn_off: led_red
          - script.execute:
              id: show_status
              state: 0
  on_quiet_calibration_started:
    - script.execute:
        id: show_status
        state: 2
  on_quiet_calibration_complete:
    - script.execute:
        id: show_status
        state: 4
  on_music_calibration_started:
    - script.execute:
        id: show_status
        state: 3
  on_music_calibration_complete:
    - script.execute:
        id: show_status
        state: 4

# Power hold — GPIO4 must stay HIGH or device powers off
# Red LED on GPIO19 (simple on/off, shared with IR, not addressable RGB)
output:
  - platform: gpio
    id: power_hold
    pin: GPIO4
  - platform: gpio
    id: led_red
    pin: GPIO19

# SPI bus for the ST7789V2 TFT display
spi:
  clk_pin: GPIO13
  mosi_pin: GPIO15

# 1.14" TFT LCD (135x240, ST7789V2) — used for status feedback
display:
  - platform: st7789v
    id: tft_display
    model: Custom
    cs_pin: GPIO5
    dc_pin: GPIO14
    reset_pin: GPIO12
    backlight_pin: GPIO27
    height: 240
    width: 135
    offset_height: 40
    offset_width: 52
    rotation: 90
    update_interval: never
    lambda: |-
      // Display is updated on-demand by scripts, not continuously

# Global to track display state
globals:
  - id: display_state
    type: int
    restore_value: no
    initial_value: '0'

# Display scripts
script:
  - id: show_status
    mode: restart
    parameters:
      state: int
    then:
      - lambda: |-
          id(display_state) = state;
          auto *disp = id(tft_display);
          disp->fill(Color::BLACK);
          // 0=off, 1=muted, 2=quiet_cal, 3=music_cal, 4=cal_done
          switch (state) {
            case 1:  // Muted
              disp->filled_rectangle(0, 0, 240, 135, Color(200, 0, 0));
              disp->printf(120, 50, id(status_font), Color::WHITE, TextAlign::CENTER, "MUTED");
              break;
            case 2:  // Quiet calibration
              disp->filled_rectangle(0, 0, 240, 135, Color(0, 150, 0));
              disp->printf(120, 35, id(status_font), Color::WHITE, TextAlign::CENTER, "Calibrating");
              disp->printf(120, 75, id(status_font), Color::WHITE, TextAlign::CENTER, "Quiet Room");
              break;
            case 3:  // Music calibration
              disp->filled_rectangle(0, 0, 240, 135, Color(0, 50, 200));
              disp->printf(120, 35, id(status_font), Color::WHITE, TextAlign::CENTER, "Calibrating");
              disp->printf(120, 75, id(status_font), Color::WHITE, TextAlign::CENTER, "Play Music!");
              break;
            case 4:  // Done
              disp->filled_rectangle(0, 0, 240, 135, Color(0, 150, 0));
              disp->printf(120, 50, id(status_font), Color::WHITE, TextAlign::CENTER, "Done!");
              break;
            default:  // Off
              break;
          }
      # Auto-dismiss "Done" after 2s
      - if:
          condition:
            lambda: 'return state == 4;'
          then:
            - delay: 2s
            - script.execute:
                id: show_status
                state: 0

font:
  - file: "gfonts://Roboto"
    id: status_font
    size: 28

sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    bass_energy:
      name: "Bass Energy"
    mid_energy:
      name: "Mid Energy"
    high_energy:
      name: "High Energy"
    amplitude:
      name: "Amplitude"
    bpm:
      name: "BPM"

binary_sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    onset_detected:
      name: "Audio Sensor"
    silence:
      name: "Silence"
  # Button B (side) — primary control button
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
    name: "Device Button"
    id: device_button
    on_multi_click:
      # Double click: calibrate quiet room
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - button.press: calibrate_quiet_btn
      # Triple click: calibrate music level
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - button.press: calibrate_music_btn
      # Long press (>= 1s): toggle mute
      - timing:
          - ON for at least 1s
        then:
          - switch.toggle: mic_mute
  # Button A (front) — exposed for custom use
  - platform: gpio
    pin:
      number: GPIO37
      inverted: true
    name: "Button A"
    id: button_a

number:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    beat_sensitivity:
      name: "Beat Sensitivity"
    squelch:
      name: "Squelch"

select:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    detection_mode:
      name: "Detection Mode"

switch:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    microphone_mute:
      name: "Microphone Mute"
      id: mic_mute

button:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    reset_agc:
      name: "Reset AGC"
      id: reset_agc_btn
    calibrate_quiet:
      name: "Calibrate Quiet Room"
      id: calibrate_quiet_btn
    calibrate_music:
      name: "Calibrate Music Level"
      id: calibrate_music_btn
