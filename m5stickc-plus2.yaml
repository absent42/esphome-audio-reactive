esphome:
  name: audio-reactive-stickc
  friendly_name: Audio Reactive Sensor (StickC Plus2)
  on_boot:
    priority: 900
    then:
      - output.turn_on: power_hold

esp32:
  board: m5stick-c
  framework:
    type: esp-idf

wifi:

improv_serial:

api:

logger:
  level: INFO

external_components:
  - source: components
    components: [audio_reactive]

i2s_audio:
  i2s_lrclk_pin: GPIO0
  i2s_bclk_pin: GPIO26

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_din_pin: GPIO34
    pdm: true
    sample_rate: 22050
    bits_per_sample: 16bit
    channel: right

audio_reactive:
  id: audio_analysis
  microphone: mic
  update_interval: 50ms
  beat_sensitivity: 50
  squelch: 10
  sample_rate: 22050
  on_mute_changed:
    - if:
        condition:
          switch.is_on: mic_mute
        then:
          - output.turn_on: led_red
        else:
          - output.turn_off: led_red
  on_quiet_calibration_started:
    - output.turn_on: led_red
  on_quiet_calibration_complete:
    - output.turn_off: led_red
  on_music_calibration_started:
    - output.turn_on: led_red
  on_music_calibration_complete:
    - output.turn_off: led_red

# Power hold — GPIO4 must stay HIGH or device powers off
# Red LED on GPIO19 (simple on/off, shared with IR, not addressable RGB)
# LCD backlight off — GPIO27, not used for audio-reactive
output:
  - platform: gpio
    id: power_hold
    pin: GPIO4
  - platform: gpio
    id: led_red
    pin: GPIO19
  - platform: gpio
    id: lcd_backlight
    pin: GPIO27
    inverted: true

sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    bass_energy:
      name: "Bass Energy"
    mid_energy:
      name: "Mid Energy"
    high_energy:
      name: "High Energy"
    amplitude:
      name: "Amplitude"
    bpm:
      name: "BPM"

binary_sensor:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    onset_detected:
      name: "Audio Sensor"
    silence:
      name: "Silence"
  # Button B (side) — primary control button
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
    name: "Device Button"
    id: device_button
    on_multi_click:
      # Double click: calibrate quiet room
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - button.press: calibrate_quiet_btn
      # Triple click: calibrate music level
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - button.press: calibrate_music_btn
      # Long press (>= 1s): toggle mute
      - timing:
          - ON for at least 1s
        then:
          - switch.toggle: mic_mute
  # Button A (front) — exposed for custom use
  - platform: gpio
    pin:
      number: GPIO37
      inverted: true
    name: "Button A"
    id: button_a

number:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    beat_sensitivity:
      name: "Beat Sensitivity"
    squelch:
      name: "Squelch"

select:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    detection_mode:
      name: "Detection Mode"

switch:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    microphone_mute:
      name: "Microphone Mute"
      id: mic_mute

button:
  - platform: audio_reactive
    audio_reactive_id: audio_analysis
    reset_agc:
      name: "Reset AGC"
      id: reset_agc_btn
    calibrate_quiet:
      name: "Calibrate Quiet Room"
      id: calibrate_quiet_btn
    calibrate_music:
      name: "Calibrate Music Level"
      id: calibrate_music_btn
